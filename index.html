function flagMarkup(code){return `<span class="flag"><img alt="" src="data:image/svg+xml;charset=UTF-8,${encodeURIComponent(FLAG_SVG[code]||FLAG_SVG.eng)}"></span>`}

const nodes={};
function mid(a,b){return(a+b)/2} function yAt(list,i){return list[i]}

const y4=[mid(y8[0],y8[1]),mid(y8[2],y8[3])];
const y2=[mid(y4[0],y4[1])];
function addNode(id,x,cy,cls=''){const d=document.createElement('div');d.className='node '+cls;d.dataset.slot=id;d.style.left=x+'px';d.style.top=(cy-26)+'px';stage.appendChild(d);nodes[id]=d;return d}
function bindDrag(el){el.addEventListener('dragstart',e=>{el.classList.add('dragging');e.dataTransfer.setData('text/plain',JSON.stringify({code:el.dataset.code,name:el.dataset.name}));setTimeout(()=>{if(el.parentElement?.classList.contains('node')){el.parentElement.classList.remove('filled');el.remove();save()}},0)});el.addEventListener('dragend',()=>el.classList.remove('dragging'))}
function addBankTeam(code,name,x,y){const d=document.createElement('div');d.className='team source';d.draggable=true;d.dataset.code=code;d.dataset.name=name;d.style.left=x+'px';d.style.top=y+'px';d.innerHTML=`${flagMarkup(code)}<span class="name">${name}</span>`;stage.appendChild(d);bindDrag(d);return d}
function teamEl(code,name){const d=document.createElement('div');d.className='team';d.draggable=true;d.dataset.code=code;d.dataset.name=name;d.innerHTML=`${flagMarkup(code)}<span class="name">${name}</span>`;bindDrag(d);return d}
for(let i=0;i<8;i++){const cy=y16[i];addBankTeam(...teamsLeft[i*2],pos.L.bankX,cy-39);addBankTeam(...teamsLeft[i*2+1],pos.L.bankX,cy+3);addNode('L16-'+i,pos.L.r16X,cy);addBankTeam(...teamsRight[i*2],pos.R.bankX,cy-39);addBankTeam(...teamsRight[i*2+1],pos.R.bankX,cy+3);addNode('R16-'+i,pos.R.r16X,cy)}
y8.forEach((cy,i)=>{addNode('L8-'+i,pos.L.qfX,cy);addNode('R8-'+i,pos.R.qfX,cy)});
y4.forEach((cy,i)=>{addNode('L4-'+i,pos.L.sfX,cy);addNode('R4-'+i,pos.R.sfX,cy)});
function box(el){return{l:parseFloat(el.style.left),t:parseFloat(el.style.top),w:el.offsetWidth,h:el.offsetHeight,cx:parseFloat(el.style.left)+el.offsetWidth/2,cy:parseFloat(el.style.top)+el.offsetHeight/2}}
function path(d){const p=document.createElementNS('http://www.w3.org/2000/svg','path');p.setAttribute('d',d);p.setAttribute('class','line');svg.appendChild(p)}
function leftPair(fromA,fromB,to){const a=box(fromA),b=box(fromB),t=box(to),j=(a.l+a.w+t.l)/2,y=mid(a.cy,b.cy);path(`M ${a.l+a.w} ${a.cy} H ${j} M ${b.l+b.w} ${b.cy} H ${j} M ${j} ${a.cy} V ${b.cy} M ${j} ${y} H ${t.l}`)}
function rightPair(fromA,fromB,to){const a=box(fromA),b=box(fromB),t=box(to),j=(t.l+t.w+a.l)/2,y=mid(a.cy,b.cy);path(`M ${a.l} ${a.cy} H ${j} M ${b.l} ${b.cy} H ${j} M ${j} ${a.cy} V ${b.cy} M ${j} ${y} H ${t.l+t.w}`)}
function drawLines(){svg.innerHTML='';
  for(let i=0;i<8;i++){const cy=y16[i];path(`M ${pos.L.bankX+SOURCE_W} ${cy-22} H ${pos.L.r16X} M ${pos.L.bankX+SOURCE_W} ${cy+20} H ${pos.L.r16X}`);path(`M ${pos.R.bankX} ${cy-22} H ${pos.R.r16X+78} M ${pos.R.bankX} ${cy+20} H ${pos.R.r16X+78}`)}
  for(let i=0;i<4;i++){leftPair(nodes['L16-'+i*2],nodes['L16-'+(i*2+1)],nodes['L8-'+i]);rightPair(nodes['R16-'+i*2],nodes['R16-'+(i*2+1)],nodes['R8-'+i])}
  for(let i=0;i<2;i++){leftPair(nodes['L8-'+i*2],nodes['L8-'+(i*2+1)],nodes['L4-'+i]);rightPair(nodes['R8-'+i*2],nodes['R8-'+(i*2+1)],nodes['R4-'+i])}
  const ch=box(document.querySelector('[data-slot="champion"]')),fl=box(document.querySelector('[data-slot="final-left"]')),fr=box(document.querySelector('[data-slot="final-right"]')),bl=box(document.querySelector('[data-slot="bronze-left"]')),br=box(document.querySelector('[data-slot="bronze-right"]'));
  leftPair(nodes['L4-0'],nodes['L4-1'],document.querySelector('[data-slot="final-left"]'));
  rightPair(nodes['R4-0'],nodes['R4-1'],document.querySelector('[data-slot="final-right"]'));
  const finalY=(ch.t+ch.h+fl.t)/2;
  path(`M ${fl.cx} ${fl.t} V ${finalY} H ${fr.cx} V ${fr.t}`);
  path(`M ${ch.cx} ${ch.t+ch.h} V ${finalY}`);
  const bronzeY=bl.cy;
  path(`M ${bl.l+bl.w} ${bronzeY} H ${br.l}`);
}
function bindDrops(){document.querySelectorAll('.node').forEach(slot=>{slot.addEventListener('dragover',e=>{e.preventDefault();slot.classList.add('drop-hover')});slot.addEventListener('dragleave',()=>slot.classList.remove('drop-hover'));slot.addEventListener('drop',e=>{e.preventDefault();slot.classList.remove('drop-hover');let data;try{data=JSON.parse(e.dataTransfer.getData('text/plain'))}catch{return}slot.innerHTML='';slot.appendChild(teamEl(data.code||data.flag,data.name));slot.classList.add('filled');save();updateChampionGlow()})})}
function save(){const data={};document.querySelectorAll('.node').forEach(s=>{const t=s.querySelector('.team');if(t)data[s.dataset.slot]={code:t.dataset.code,name:t.dataset.name}});localStorage.setItem('wc2026PredictorV30',JSON.stringify(data))}
function load(){const data=JSON.parse(localStorage.getItem('wc2026PredictorV30')||'{}');document.querySelectorAll('.node').forEach(s=>{s.innerHTML='';s.classList.remove('filled');if(data[s.dataset.slot]){s.appendChild(teamEl(data[s.dataset.slot].code||data[s.dataset.slot].flag,data[s.dataset.slot].name));s.classList.add('filled')}});updateChampionGlow()}
